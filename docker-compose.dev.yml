# Configuration DÉVELOPPEMENT avec hot reload et logs détaillés

services:

  orl-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orl-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - orl-network
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./requirements.txt
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=api,environment=dev"

  orl-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: orl-dashboard
    ports:
      - "8501:8501"
    restart: unless-stopped
    networks:
      - orl-network
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
    volumes:
      - ./dashboard:/app/dashboard
      - ./data:/app/data
    develop:
      watch:
        - action: sync
          path: ./dashboard
          target: /app/dashboard
        - action: rebuild
          path: ./requirements-dashboard.txt
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    depends_on:
      orl-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=dashboard,environment=dev"

  orl-nginx:
    image: nginx:1.29-alpine
    container_name: orl-nginx
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - orl-network
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      orl-api:
        condition: service_healthy
      orl-dashboard:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "pgrep", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        labels: "service=nginx,environment=dev"

networks:
  orl-network:
    driver: bridge
    name: orl-network-dev
