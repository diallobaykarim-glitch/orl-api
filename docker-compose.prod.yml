# Configuration PRODUCTION — ressources strictes, logs limités, pas de hot reload

services:

  orl-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orl-api-prod
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - orl-network
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 1.5G
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/docs', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "service=api,environment=prod"
    security_opt:
      - no-new-privileges:true

  orl-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: orl-dashboard-prod
    ports:
      - "8501:8501"
    restart: unless-stopped
    networks:
      - orl-network
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 800M
    depends_on:
      orl-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "service=dashboard,environment=prod"
    security_opt:
      - no-new-privileges:true

  orl-nginx:
    image: nginx:1.29-alpine
    container_name: orl-nginx-prod
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - orl-network
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      orl-api:
        condition: service_healthy
      orl-dashboard:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "pgrep", "nginx"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "service=nginx,environment=prod"
    security_opt:
      - no-new-privileges:true

networks:
  orl-network:
    driver: bridge
    name: orl-network-prod
